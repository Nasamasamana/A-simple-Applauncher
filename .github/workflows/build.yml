name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SourceCode/AppLauncher.csproj
    
    - name: Publish
      run: dotnet publish SourceCode/AppLauncher.csproj -c Release -r win-x64 --self-contained false -o Release/
    
    - name: Commit Release
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Release/
        git commit -m "Build: Release binaries" || true
        git push || true
